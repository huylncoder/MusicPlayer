<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music player</title>
    <link rel="icon" href="./assets/img/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="player">
      <!-- Dashboard -->
      <div class="dashboard">
        <!-- Header -->
        <div class="header-wrap">
          <div class="btn btn-volume">
            <i class="fas fa-volume-up"></i>
            <div class="volume-wrap">
              <input type="range" class="volume-range" value="50" min="0" max="100" />
              <p class="volume-output">50</p>
            </div>
          </div>
          <header>
            <h4>Now playing:</h4>
            <h2>String 57th & 9th</h2>
          </header>
          <div class="option">
            <i class="fas fa-ellipsis-h"></i>
            <div class="option-list">
              <div class="option-item theme-btn">
                <span>Dark mode</span>
                <i class="theme-icon fas fa-moon"></i>
              </div>
              <div class="option-item">
                Bài hát yêu thích
              </div>
            </div>
          </div>
        </div>
        <!-- CD -->
        <div class="cd">
          <div class="cd-thumb" style="background-image: url('./assets/img/cdthumb.jpg');"></div>
        </div>

        <!-- Control -->
        <div class="control">
          <div class="btn btn-repeat">
            <i class="fas fa-redo"></i>
          </div>
          <div class="btn btn-prev">
            <i class="fas fa-step-backward"></i>
          </div>
          <div class="btn btn-toggle-play">
            <i class="fas fa-pause icon-pause"></i>
            <i class="fas fa-play icon-play"></i>
          </div>
          <div class="btn btn-next">
            <i class="fas fa-step-forward"></i>
          </div>
          <div class="btn btn-random">
            <i class="fas fa-random"></i>
          </div>
        </div>

        <input id="progress" class="progress" type="range" value="0" step="1" min="0" max="100" />

        <audio id="audio" src=""></audio>
      </div>

      <!-- Playlist -->
      <div class="playlist">
        
      </div>
      <!-- Overlay contains favoriteSongs box -->
      <div class="favorite_songs-modal">
        <div class="favorite_songs">
          <div class="favorite_songs-header">
            <h4>Danh sách bài hát yêu thích</h4>
            <i class="favorite_songs-close fas fa-times"></i>
          </div>
          <div class="favorite_songs-list">

          </div>
          <div class="empty-list">
            <i class="fas fa-music"></i>
            <h4>Empty List</h4>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
